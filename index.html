<script>
const SLIDES = [{"n": 1, "layout": "title", "title": "Agent Quality & Token Optimization", "subtitle": "A customer-facing workshop", "presenter": "Michael Diiacovo · Senior Customer Success Architect · GitHub", "notes": "Welcome to this presentation about Agent quality and token optimization. The motivation for this is of course GitHub's switch from premium requests to usage-based billing. This raised a lot of questions about token consumption. Customers are asking *\"how do we improve our token spend?\"* But focusing purely on cost can actually diminish the value you get out of Copilot. So better question to ask is: “How can we make the most out of the Tokens we spend?” – which actually comes with token optimizations, as we will learn."}, {"n": 2, "layout": "content", "kicker": "Agenda", "title": "Three parts", "bullets": ["01 · Why agent <b>quality</b> is the better focus for optimizing tokens", "02 · Foundations — how LLMs, agents & context windows actually work", "03 · Quality & token controls, with practical optimization tips"], "notes": "This presentation has three parts: Part 1: Why Agent Quality is the Better Focus We'll explore why optimizing for quality beats optimizing for cost alone, and how quality improvements naturally reduce token spend. Part 2: Foundations We'll cover the fundamentals of large language models, agents, and context windows. This foundation will help you gain a deep understanding about optimizations and quality, but also help you evaluate the hundreds of token optimization tips circulating online and form your own judgment about what works. Part 3: Quality & Token Controls We'll dive into the practical controls you can employ—from model choice to prompts to agent configs—with actionable optimization tips. The goal: help you be better with less."}, {"n": 3, "layout": "content", "part": "Part 01 · Why quality", "kicker": "The problem", "title": "Agent gambling is no longer sustainable", "bullets": ["Today most of us \"gamble\": little context, a quick prompt, hope it lands — like firing 20 cheap rockets at the moon", "That worked when you ran 2–3 agents a day and tokens were cheap", "It breaks when every developer dispatches dozens–hundreds of longer agent sessions", "When tokens aren’t cheap, accuracy stops being optional — it takes engineering"], "notes": "Let's start with why agent quality is the better focus. To understand this, look at how the industry is operating today — how each of us is probably acting. We're using agents in what I'd call a **gambling system**. **The NASA Artemis analogy:** Imagine if rockets were cheap. NASA could just send 20 rockets roughly in the direction of the moon. If one of them landed, perfect. If none of them landed, you'd just send off the next 20. That maps precisely to how agents are often used: - You give only a little context. - You write a prompt, but don't put too much effort into it. - You send the agent on its way. - If it comes back with a good result, great. If it doesn't, you just send off the next agent. The problem is that this gambling approach is no longer sustainable — and it never really was. It was sustainable when you only had two, three, or four agents a day. It's no longer sustainable in the direction we're moving, where dozens if not hundreds of agents get dispatched by every single developer every day. Those agent sessions also become longer and longer. This is not sustainable from a financial point of view for us at GitHub, because we used to bear that cost. And now that we're switching to a usage-based model, it's also no longer sustainable for you as a customer. So it's definitely time for a change. But if you purely look at this from a cost angle, the question becomes: *how can we make the fuel cheaper?* That's really just asking *how can we continue to gamble?* — and that isn't the right thing to do. I also don't think it's what you actually want to d Instead, we should work on decreasing the number of rockets we send out, because more of them will actually hit their target. In other words, we need to increase the value of each and every agent. We need to increase the quality of the agents we send *before* we send them out, so that more of them reach their target. Overall, we need fewer agents — and fewer agents automatically means fewer tokens spent. We need to start working on a better **return on investment** for our agents."}, {"n": 4, "layout": "content", "part": "Part 01 · Why quality", "kicker": "The ROI lens", "title": "Quality → value → ROI", "bullets": ["Agent ROI = value of output ÷ token cost — optimizing cost when value is ~0 is useless work", "You can’t cleanly measure \"value,\" but the formula is still useful guidance", "Often the way to <b>raise value is to cut tokens</b>: stop stuffing irrelevant context", "Trimming context is the first big lever for <b>both</b> quality and cost"], "notes": "And increasing the value of an agent means we have to increase it’s quality -  make the rocket land! Because optimizing cost when the value is 0 is usless work – as we can clearly see when looking at the ROI formular. This is the standard ROI formula applied to agentic development. A caveat: you can't really calculate it cleanly — how do you quantify the value of an agent output? A lot of companies struggle with this, and honestly, we don't have a perfect recommendation either. But just because you can't calculate the formula doesn't mean it isn't true. It's still useful as guidance. But there is another dynamic at play that makes this argument even stronger: Often, increasing the Value of an Agent is achieved by actually decreasing the amount of Tokens. What we see many developers do is: - stuff irrelevant and way too text into context windows. - let conversations compound with useless information they pay for every turn. **Reducing this context is a first huge lever both, for better quality and less token costs.** But this is not the only reason quality plays a huge role in our ROI. [NEXT SLIDE]"}, {"n": 5, "layout": "content", "part": "Part 01 · Why quality", "kicker": "Compounding errors", "title": "Small misses compound fast", "bullets": ["LLMs are non-deterministic — never 100% accurate", "At 99%/step, a 50-step workflow lands at ~61%. At 95%/step → ~8%", "Every quality gain dramatically raises the odds of success", "This is the agentic case for shift-left: quality, testing, security, early"], "notes": "But there is a third reason why focusing on quality is more important: The Compounding Error Problem** Large language models are non-deterministic. They have an error margin and will never be 100% accurate. In multi-step agentic workflows, this creates compounding errors. Here's the math: At 99% accuracy per step (which is optimistic), 50 steps reduces your overall accuracy to just 61%. Drop to 95% per step—still sounds good, right?—and you end up at 8% accuracy over 50 steps. This doesn't mean every agent will fail. But it means every quality improvement dramatically increases your chances of success. And consider the cost: every agent miss wastes those tokens, requiring bug fixes, reviews, and additional agent runs. You might even have incidents caused by low-quality agent output. In classical software development, we addressed this kind of problem with the **shift-left movement** — shift-left quality, testing, security. All of that becomes even more true in agentic systems."}, {"n": 6, "layout": "statement", "part": "Part 01 · Why quality", "title": "Instead of counting tokens,<br>make every token <span>count</span>.", "bullets": ["Reduce token size — driven by quality, not cost. Send few rockets with high accuracy, and the fuel optimizes itself."], "notes": "So to sum things up: > Instead of counting tokens, **make every token count.** Yes, reduce token size — but not driven by cost, but quality. You want to send few rockets with high accuracy - which will automatically optimize the fuel."}, {"n": 7, "layout": "divider", "part": "Part 02", "title": "LLMs, Agents & Context Windows", "bullets": ["To raise quality, first understand how the pieces actually fit together."], "notes": "To increase the quality of agents, we first have to understand how all of this works:The LLMs, The Agents, the Context window – and how it all ties together."}, {"n": 8, "layout": "content", "part": "Part 02 · Foundations", "kicker": "What an LLM is", "title": "A word-probability machine", "bullets": ["Text in, text out — it predicts the most probable next token, then the next", "Coding is the same mechanic: predicting the next statement instead of prose", "Models added compute, accuracy, and coding bias — but the core principle is unchanged"], "notes": "A quick high-level refresher. An LLM is a **text-in, text-out machine**. - Under the hood it's a **word probability machine**: given the input + training data, it predicts the most probable next word, then the next, until a sentence is formed. In coding: same mechanics, just predicting the next instruction or statement instead of prose. Of course models got better and better over the past years and a lot of bells and whistles got added for more compute, higher accuracy, biases towards software development etc. – but the underlying principle and capabilities are very much still just this."}, {"n": 9, "layout": "statement", "part": "Part 02 · Foundations", "title": "Provide as <span>little</span> context as possible,<br>but as much as <span>required</span>.", "bullets": ["Too much → irrelevant info biases the model wrong. Too little → it hallucinates to fill gaps, with no error message. Context engineering is the fundamental skill."], "notes": "When mapped toe response quality, the Core Principle is: Context Balance Provide as little context as possible, but as much as required. Finding this sweet spot maximizes LLM effectiveness. Too Much Context: Irrelevant information biases the model toward incorrect answers. The LLM can't distinguish relevant from irrelevant data—it considers everything when calculating probabilities. Too Little Context: Missing critical information biases the model away from correct knowledge. Worse, the model may hallucinate to fill gaps—and there's no error message indicating it lacked information. The math makes no distinction between hallucination and fact. This is why context engineering is the fundamental skill for working with agents."}, {"n": 10, "layout": "content", "part": "Part 02 · Foundations", "kicker": "Multi-step loops", "title": "The agent talks to the LLM for you — dozens of times", "bullets": ["An agent (the \"harness\") is just an app: VS Code chat, Copilot CLI, Copilot cloud agent, Claude Code, Codex…", "The LLM is just the model: GPT, Claude, Gemini", "It’s <b>not magic — just text</b>, and critically <b>stateless</b>: every turn re-sends all prior input+output", "Your levers: your prompt, your project files, and agent configs (instructions, skills, MCPs)"], "notes": "With agents, the previous rule matters even more — because it's no longer a single back-and-forth. The agent talks to the LLM on your behalf, dozens of times, before it comes back to you. An agent is just an app — code. There are many \"harnesses“ offered by GitHub: - VS Code chat (where this all started) - Copilot CLI - Copilot cloud agent - And even Third Party Harneeses like Claude Code & Codex The LLM itself is just the model — GPT, Claude, Gemini. Now what we need to undestand here is that the way an agent interacts with it is **not magic, it‘s still just text**. And critically: **stateless text.** - An LLM does not store conversations. - \"Having a conversation\" actually means re-sending the entirety of inputs and outputs, in order, every single turn. - Tokens and context **compound**. As you can see, the Harness in for itself already has a large role in agent quality, but you still have ways to influcence it.. Your levers to influence the agent: Your prompt The files in your project - Agent configs such as Instructions, skills, MCPs"}, {"n": 11, "layout": "content", "part": "Part 02 · Foundations", "kicker": "Token consumption", "title": "Everything compounds each loop", "bullets": ["Each loop re-sends: system prompt + tools + your prompt + files = input tokens; the reply = output tokens", "Loop 2+ adds all of loop 1 plus new input — tokens compound every turn", "~1 token ≈ ¾ of a word; limits range ~50–200K (small) to ~1M (Opus/GPT-5.5)", "Think high-level — prompts, files, responses all cost, and they accumulate"], "notes": "Understanding Token Consumption First, let's look under the hood at context windows. On every loop, the agent sends the entire conversation to the LLM again: Loop 1: System prompt + tools (descriptions of available functions like read file, write file) + your prompt + file references = **input tokens** The LLM responds = **output tokens** Loop 2 and beyond: All of Loop 1 + previous responses + new input = more tokens Token Basics: - 1 token ≈ 3/4 of an English word (think \"1 token = 1 word\" as a mental model) - Context limits vary: smaller models handle 50-200K tokens, larger models like Claude Opus or GPT-5.5 handle 1M tokens - 1 million tokens ≈ Lord of the Rings trilogy + The Hobbit However, don't get caught up in tokenization details, as you don‘t have that much control over it anyways — think at a higher level: prompts, files, responses all consume tokens, and they compound with each loop."}, {"n": 12, "layout": "content", "part": "Part 02 · Foundations", "kicker": "Context rot", "title": "Lost in the middle & recency bias", "bullets": ["<b>Lost in the middle</b> (&lt;50% full): models favor the start & end — switching tasks mid-session makes it snap back to the original task", "<b>Recency bias</b> (&gt;50% full): it forgets system/custom instructions and drifts on recent context", "Fix: new context window per distinct task; keep the window under ~60–70%", "Just because you <i>can</i> fill the window doesn’t mean you should"], "notes": "Before diving into controls, we need to understand two major problems with context windows: 1. Lost in the Middle (<50% tokens) The model favors content at the beginning and end of the context window, not the middle. This is usually fine because: - Beginning = your instructions, goals, and plan (you want this prioritized) - End = current work stream (also important) - Middle = past work (less relevant) The problem hits when you switch tasks mid-session. Example: You start with a bug fix, then mid-conversation say \"now let's implement a feature.\" As the window grows, the model may suddenly switch back to the bug fix because it biases the initial statement over recent ones. Solution: Use a new context window for each distinct task. 2. Recency Bias (>50% tokens)* Above 50% capacity, the model starts favoring only the end of the conversation. It forgets your system instructions, custom instructions, and original prompt. The model drifts—doing things you don't understand based solely on recent context. Solution: Don’t let your token window grow beyond 60—70% unless  really necessary. Dividing and conquer tasks from the get go is the best to counter this problem, followed by potentially compounding a conversation. Lastly, don't take this as something that will always happen — bias doesn't mean the model *will* forget everything in the middle. Don't deal in absolutes here. There are of course scenarios where you'll need to go above 50% of the token window — 60, 70, 80% — and that's fine. It's just something to keep in mind that you can use to optimize your usage."}, {"n": 13, "layout": "divider", "part": "Part 03", "title": "Quality & Token Controls", "bullets": ["Now the practical guidance — things you can start doing today."], "notes": "Hopefully this gives you a good foundational understanding of tokens, context windows, large language models, and agents, and first ideas on how to optimize your usage. With this knowledge, let’s now look at the practical guidance and things you can do, starting today, to improve the quality of your agents and your tokens."}, {"n": 14, "layout": "content", "part": "Part 03 · Controls", "kicker": "Match effort to maturity", "title": "AI-assisted engineer vs. AI engineer", "bullets": ["Work sync with ~10 agents/day at $20/mo? Optimizations matter less — 50% off is still just $10", "Orchestrating dozens–hundreds of async agents? Every % of tokens and quality compounds", "The following controls are ordered by lever and by effect — start at the top"], "notes": "Before we dive in, one thing to understand: depending on your **maturity** in working with agents, you need to take more or less care about optimizations. If you only send off 10 agents a day — you work synchronously, you treat AI as an assistant rather than an autonomous part of your team — optimizations will have less effect. If you only spend $20 a month on a few tokens, even saving 50% through every optimization in this deck only gets you to $10. Probably not worth a huge effort. Compare that to what we might call an **AI engineer** — an orchestrator of multiple asynchronous agents, dozens if not hundreds of them. Every percent of token usage you can shave off, and every percent of quality you can add (think back to the compounding error problem), is effort well spent across the accumulation of agents. The optimizations that follow are ordered by lever and by the effect they have. So if you're on the left side of the maturity spectrum, the first few are more relevant than the later ones. I'm also going to share some power-user tips at the end."}, {"n": 15, "layout": "content", "part": "Part 03 · Controls", "kicker": "Lever #1", "title": "Model choice & auto mode", "bullets": ["<b>Reasoning</b> (Opus, GPT-5.5): planning, architecture, debugging, big-context sync work", "<b>Mid-tier</b> (Sonnet, GPT-5.4): async implementation from a tight spec", "<b>Low-tier</b> (Haiku, GPT-mini): small refactors, repetitive tasks, docs", "Up to ~24× cost gap; reasoning models can <i>hurt</i> a tight spec by second-guessing it", "Stay lazy with <b>Auto mode</b>; make deliberate choices only when it matters"], "notes": "Lever #1: Model Choice Common pattern: cheap models → everyone defaults to the biggest (Claude Opus 4.6/4.7) for everything, including typo fixes. The waste is significant. The Cost Gap: 24x difference between Claude Opus 4.7 and GPT-5.4 mini. Model choice impacts both token cost and quality—bigger doesn't always mean better. When to Use Reasoning Models: - Planning and architecture - Debugging complex bugs - Synchronous work where you drive the agent - Tasks requiring large context windows (many files) **When to Use Smaller Models:** For implementation after planning is done. The reasoning happened in the planning phase—now you just need execution. **Quality Impact:** Using reasoning models for implementation can hurt quality. If you have a tight spec, a reasoning model might re-open the plan, second-guess it, and go rogue: \"Actually, this spec is wrong—I'll do it my way.\" **Solution: Auto Mode** Starting in June, auto mode will have task intent detection and choose the model automatically. Stay lazy, stay with auto mode, and make deliberate model choices only when it matters. Lever #2: Provide Only Relevant Context Don't stuff the prompt with \"might need\" information. Let the agent discover what it needs—it can find files on its own. Don't attach your entire project for a small change. - Context engineering is the core skill to build. All following tips are context engineering techniques. - Compacting: Can reduce tokens, but comes with information loss. If lost information was relevant, you create agent misses—token savings become quality loss. - Use /clear liberally:** Start fresh for each new task or when the window gets too long. Don't try to steer a bloated session with 80% context filled—recency bias won't let you succeed. - Tokens don't accumulate across sessions. Throw away context without hesitation."}, {"n": 16, "layout": "content", "part": "Part 03 · Controls", "kicker": "Lever #2 · Prompts", "title": "Guide the agent from the start", "bullets": ["Optimize prompts to <b>steer correctly</b>, not for fewer tokens — they’re always-on, high-influence context", "Be precise: \"Issue #45 describes bug X — fix it,\" not \"fix the bug\"", "Add stop signals: \"Once tests pass, stop\" — prevents wasted extra work", "Provide known context up front: files, folders, docs, skills"], "notes": "**Your Prompt: Always-On Context** Don't optimize prompts for fewer tokens—optimize to steer the agent correctly from the start. Prompts, systems, and tools are always in the context window at the beginning, giving them outsized influence (remember \"lost in the middle\" bias). Be Precise: - ❌ \"Fix the bug\" - ✅ \"Issue #45 describes a bug where XY happens—fix it\" Include Stop Signals: \"Once the bug is fixed and tests pass, stop.\" This prevents the agent from continuing with unnecessary work (git commit, push, linking files, etc.). Add known Content: If you know where files or other context lies, don‘t let the agent find it. Provide it! Same is true for documentaiton websites you want the agnet to fetch, skills to invoke – whatever you can put there from the start will improve your experience and reduce the cycles and tokens used for the same outcome."}, {"n": 17, "layout": "content", "part": "Part 03 · Controls", "kicker": "Lever #3 · Phases", "title": "Divide & conquer: research → plan → implement", "bullets": ["Do it all in one session and you drag irrelevant context through every turn", "Use a <b>new context window per phase</b> — some duplication, much better quality & cost", "Plan with a reasoning model to produce a precise spec (a detailed to-do)", "With a clear spec, run agents in <b>parallel</b> by layer (frontend/backend/db) with defined contracts"], "notes": "Work in Phases: Research → Plan → Implement Research (optional, use `/research` in Copilot CLI) loads many files—most won't be relevant for implementation. If you do all phases in one session, you carry irrelevant context through all turns, degrading quality and wasting tokens (even cached ones). **Better approach:** Create new context windows between phases. Yes, some duplication, but improved quality and token efficiency. For planning, use good models (doesn't always need to be Opus 4.7, but something with reasoning capability). Planning Mode for Complex Features: For sophisticated features, use planning mode with reasoning models (they excel at viewing plans from every angle and identifying gaps). The goal: create a precise specification—a detailed to-do list that covers all thinking upfront. Parallel Agent Implementation: With a clear spec, you can deploy multiple agents in parallel: - Split by architecture layer (frontend, backend, database) - Define contracts between components - Each agent works efficiently with only relevant context This approach saves both time and tokens—agents aren't carrying unnecessary knowledge for their specific task."}, {"n": 18, "layout": "content", "part": "Part 03 · Controls", "kicker": "Lever #4 · Determinism", "title": "Avoid compounding errors with tests", "bullets": ["Deterministic controls counter non-deterministic drift — tests either pass or fail", "Copilot CLI team ships ~500 PRs/week; ~53% of their codebase is tests", "A failing test resets accuracy — pulls a drifted agent back on track", "Not just tests: linters, security scanners, any guardrail you can enforce in code"], "notes": "While not strictly context optimization, deterministic controls (like tests) are essential context engineering tools that counter non-deterministic LLM behavior. What this means is: write tests, have tests, tests, and even more tests. The Copilot CLI team ships 500 PRs a week. Their number-one context engineering practice is **tests** — 53% of their codebase is just tests. Why? Because a test is a **deterministic control**. It either fails or it doesn't. The agent will execute this deterministic control, and it counters the compounding error problem heavily. If after 10 steps you've landed at 50% accuracy, the test will fail and bring the agent back on track to 99%. You basically restart the accuracy by having tests. **Beyond tests** It's not just tests, of course — it's also linters, security scanners, and any other guard rails you can architect through code. Whatever deterministic controls you can throw at the agent and have it execute, that's a good way to do this. **Visualizing it on the context window** Here's what we see with a unit test in place: There is a buggy change. - A failing test tells the agent: \"Stop, you can't continue.\" - The agent corrects the change and then builds on top of a stable working base. - It continues making the rest of the changes until all tests succeed and the agent is done. If you don't have tests, the agent will build a buggy change on top of a buggy change on top of a buggy change. Yes, it might be done quicker, earlier, and with fewer tokens. But what you have without tests is an **incident** — or a bug. And the costs add up: - Wasted CI/CD minutes - Copilot review cycles and agent runs spent unnecessarily - Human time required to fix these bugs - A debugging session that fills the next context window The accumulation of tokens is then much higher, and the cost is much higher than if you'd just had tests in the first place. If you spend some time on testing — shifting left — that's what we've done in this industry for the past 15 years to improve our outputs and improve the value. And it's so much more true for agents than it was before."}, {"n": 19, "layout": "content", "part": "Part 03 · Controls", "kicker": "Agent configs", "title": "Context engineering = agent configuration", "bullets": ["Markdown files & controls agents pick up automatically:", "<code>copilot-instructions.md</code> · custom agents · skills · MCP servers", "sub-agents · scoped instructions · prompt files · Copilot Memory", "The next slides go deeper on each"], "notes": "Let's examine **agent configs**. When we talk about context engineering, often it's basically a one-on-one with agent configurations. Agent configurations are all those markdown files and controls you can put in place that agents will take into account automatically: - Persistent instructions (your `copilot-instructions.md`) - Custom agents - Skills - MCP servers Sub-agents Scoped Instructions Prompt Files Copilot Memory Let’s look and some of those in more detail, and how you can use them to improve quality and tokens."}, {"n": 20, "layout": "content", "part": "Part 03 · Controls", "kicker": "Always-on", "title": "Persistent instructions", "bullets": ["In context for <b>every</b> session — so keep them very small and concise", "Put in: non-negotiable guardrails, recurring agent-miss corrections, output trimming (\"be concise\")", "Output tokens are the most expensive — trimming them matters", "Write them yourself (don’t generate with AI), iterate on real misses, recreate often"], "notes": "Persistent instructions are in the context window for every agent session, every interaction. Requirements: - Must be very concise and small - Don't put entire documentation or human-readable guides - Think of it as your „human-in-the-loop“ proactive guidance for every agent **What Belongs:** - **Non-negotiables:** Project guard rails that every agent must follow - **Agent miss prevention:** Correct recurring errors (wrong testing framework, wrong build command, etc.) - **Output trimming:** \"Be concise,\" \"drop niceties,\" \"only return code“ - Output tokens are the most expensive—trimming them matters. **Side Note:** Research shows \"be concise\" yields almost the same results as the 50-line caveman skill. **Best Practices:** 1. **Don't use AI to generate instructions.** This is your chance as a human to guide agents and fill gaps AI can't know. AI-generated instructions are speaky and imprecise. 2. **Write them yourself,** based on real agent behavior in your project. 3. **Iterate.** Doesn't need to be perfect from the start—add corrections as you observe agent misses. 4. **Recreate them:** What also helps is **recreating them often**. Models and, your project changes constantly. For reference: The Copilot CLI team throws away their entire instructions every three months because they might be outdated, no longer relevant, no longer contain the required information, or compound useless information. Considering this a **living, breathing document**."}, {"n": 21, "layout": "content", "part": "Part 03 · Controls", "kicker": "Manually invoked", "title": "Custom agents — design workflows & behaviors", "bullets": ["Force an agent into a specific role/way of working, invoked by you (e.g. <code>/tdd-red</code>)", "Write the prompt once, reuse it again and again", "The harness loads the agent file and <b>adjusts available tools</b> — which itself trims tokens"], "notes": "Custom agents are a way to force an agent into a certain role or way of working. They are best considered as something **manually invoked by you as a human**, when you want to orchestrate an agent workflow and have an agent behave a very specific way. In the example here, we have a test-driven development agent — and even one that is very specifically scoped to only implement red, so failing, tests. This is something an agent wouldn't do on its own; it would require a lot of prompting. A custom agent is a nice way to write that prompt once and reuse it again and again. **How they work** You invoke them manually. They can also be invoked automatically, but let's leave that out for now. For our mental model, you invoke them with a slash command. In this case you might say: \"Hey, add an API endpoint and implement the test first.“ The harness will retrieve that custom agent file and then **adjust the available tools** accordingly. That's another neat thing you can do with custom agents — you can adjust which tools the agent has access to. This itself will already reduce a little bit of token consumption, though it's not the most relevant lever. Input tokens will get cached, and even though tools can make up a large portion of the system-and-tools prompt, they're usually not a big lever when we talk about token optimization. **The real benefit: preventing wrong paths** What it *will* do is prevent your agent from going down a path you don't intend in the first place. For example, if you only want it to read an issue in GitHub for getting the specification — not write or update it — you prevent the agent from going down that path by simply not giving it the tool."}, {"n": 22, "layout": "content", "part": "Part 03 · Controls", "kicker": "Lazy-loaded", "title": "Skills — conditional capabilities", "bullets": ["Markdown that shapes behavior, <b>loaded dynamically</b> when the task matches — not always-on", "Harness offers skill descriptions; the LLM requests the full skill when needed", "Great for offloading context that isn’t always relevant", "Don’t overdo it — skip redundant skills (it already knows React); maintain them as models evolve"], "notes": "Close to custom agents — but not quite the same — are **skills**. Skills also allow you to have a markdown description that makes your agent behave a very specific way. The difference: a skill is something you offer to your agent based on the task it's doing, and it can be **loaded dynamically**. So it's not always-on content. Part of it is: the harness pulls the skill description and puts it into the context window. Same as with tools, the harness is now offering skills to the LLM. **Skills: Lazy-Loaded Context** When the LLM detects a task matching a skill (e.g., \"work on the API\"), it tells the harness to load that skill. This is a great way to offload context that isn't always relevant. **Best Practices for Skills:** - Don't overdo it—you don't need hundreds of skills - Be wary of redundant skills (e.g., does the LLM really need a \"React skill\" when it's already proficient in React?) - Only use skills for capabilities the agent wouldn't otherwise have - Maintain them—as LLMs evolve, some skills become unnecessary"}, {"n": 23, "layout": "content", "part": "Part 03 · Controls", "kicker": "External tools", "title": "MCPs — integrate 3rd-party tooling", "bullets": ["Add external APIs/dynamic tools; e.g. GitHub MCP’s <code>get_issue</code>", "Be rigorous: tool descriptions bloat context and can trigger undesired tool calls", "Deactivate MCPs you don’t always need, or scope them inside custom agents", "Playwright is powerful but costly — use it only when actually needed"], "notes": "**MCPs (Model Context Protocol):** MCPs add external API calls and dynamic tools to agents. Once activated, they return tool descriptions that go into the context window. Example: GitHub MCP offers a `get_issue` tool. User says \"read issue #45\" → LLM recognizes the tool → invokes it via the harness. **Be Rigorous with MCPs:** - They bloat tool descriptions (token waste) - More importantly: they can lead agents to call undesired tools - Deactivate MCPs you don't always need, or put them in custom agents Example: Playwright The Playwright MCP is powerful for web frontend work—it can autocorrect and view websites automatically. However, it's costly (screenshots, page reads consume many tokens). If always-on, it might trigger unnecessary work (e.g., reading a webpage for a simple CSS color change). Better: use it only in combination with custom agents when actually needed."}, {"n": 24, "layout": "content", "part": "Part 03 · Controls", "kicker": "Offload context", "title": "Sub-agents", "bullets": ["Open a second context window for a task (e.g. research), keeping the main session clean", "The sub-agent processes docs and returns only a relevant summary", "Trade-off: tokens spent in the sub-agent — use cautiously"], "notes": "Sub-agents open a second context window for specific tasks (like research), preventing the main session from filling with irrelevant information. The sub-agent processes documents, creates a summary, and returns only relevant information to the main session. This improves main session quality but comes with the trade-off of tokens spent in the sub-agent. **When to Use Sub-Agents:** - The agent often decides automatically - You can explicitly invoke them for research tasks - Use cautiously—they're a conditional optimization"}, {"n": 25, "layout": "content", "part": "Part 03 · Controls", "kicker": "Good to know", "title": "What else", "bullets": ["<b>Scoped instructions</b>: conditional by file path — useful for monoliths, but start static", "<b>Prompt files</b>: reusable manual prompts (not in Copilot CLI); skills/custom agents usually better", "<b>Copilot Memory</b>: learns from behavior in the background — check it periodically"], "notes": "The3se other agent configs have less impact on tokens and quality, but are still good to be aware of: **Scoped Instructions:** Useful for monoliths with distinct code sections, but very conditional. Start with static instructions; only move to scoped if they become too long. **Prompt Files:** Reusable prompts, manually invoked. Not supported in Copilot CLI. Usually, skills or custom agents are better choices. **Copilot Memory:** Automatically learns from your behavior and team patterns, creating instructions that improve agent quality over time. It works in the background—not much to proactively optimize, but worth checking periodically."}, {"n": 26, "layout": "content", "part": "Part 03 · Controls", "kicker": "Advanced", "title": "Power-user tips", "bullets": ["<b>Think in code</b>: script-filter outputs before feeding them to AI", "<b>CLI vs MCP</b>: known CLIs (e.g. <code>gh</code>) can be leaner than MCP equivalents", "<b>Trim shell output</b> (e.g. RTK); <b>collapse tool calls</b>; run <code>/chronicle</code> to find wins", "These trade time/knowledge for savings — conditional, not defaults"], "notes": "**Power User Tips (Advanced Territory):** These require more knowledge and testing—they sometimes trade quality for token savings: - **Think in code:** Create scripts to filter outputs before analysis (e.g., filter GitHub REST API to relevant fields only) - **CLI vs MCP:** Debate ongoing—CLI tools (like `gh`) are already known to models and may be leaner than MCP equivalents - **Shell output optimization:** Tools like RTK trim CLI output to agent-relevant information only - **Chronicle:** Analyzes your Copilot CLI session logs to suggest prompt optimization - **Collapsing tool calls:** Batch multiple tool calls into one to reduce turns - **Model-specific optimization:** Only for power users with thousands of agents (not recommended due to rapid model changes)"}, {"n": 27, "layout": "content", "part": "Part 03 · Controls", "kicker": "Long-term", "title": "Traits that will matter most", "bullets": ["<b>Analytical skills</b>: domain understanding & precise instruction — agents execute, they don’t strategize", "<b>Good architecture</b> (DDD, hexagonal, CQRS, event-driven): fewer misses, stronger guardrails", "<b>Iterate like an engineer</b>: keep configs fresh, treat agent misses like incidents"], "notes": "Let’s end this session with a more forward looking, long-term outlook on what things to focus on to be truly successful with agentic development. 1. Build Analytical Skills What set developers apart was never just writing code—it was analytical skills. Building domain knowledge quickly, understanding customer needs, and translating requirements to technology. This is your strong suit, and it's highly demanded going forward. Agents can't do this. They won't understand customers or make high-level decisions about what matters in an application. They'll execute, but not strategize. 2. Apply Good Architecture More important than ever. Good architecture: - Reduces agent misses - Provides navigation guard rails - Prevents agents from placing code in wrong locations - Maintains high code quality Recommended approaches: - Domain-Driven Design - Hexagonal Architecture - CQRS - Event-Driven Design These architectures clearly distinguish low-level technology (REST APIs) from the differentiating domain core, giving agents excellent guard rails. Debates about 5-line functions, comments, or semicolons are no longer relevant. Architecture is what matters. 3. Iterate on Prompts and Agent Configs You're now a context engineer. This isn't one-time work—it's continuous engineering. Approach it with an engineering mindset: set agents up for success consistently. Tools like Chronicle can help analyze and optimize your prompting behavior over time."}, {"n": 28, "layout": "content", "part": "Summary", "kicker": "Start today", "title": "5 things you can do now", "bullets": ["Choose the right model for the task", "Give clear guidance in your prompts", "Research → Plan → Implement", "Provide deterministic guardrails (tests, linters, security scans)", "Maintain a concise, human-written <code>copilot-instructions.md</code>"], "notes": "Let’s wrap up. I understand this was a lot to take in, so as a reminder, here are the 5 biggest tips we can give you to improve your agent quality and token spent today, that don’t require too much effort: This is just a repetition of what we've learned previously: - **Choose the model.** - **Provide clear guidance in your prompts.** - **Split your tasks.** - **Provide deterministic guard rails** — tests, linters, security scans. - **Maintain a concise, human-written Copilot instructions file** going forward. If you take anything out of this talk, it's: **write as little context as required, and as much as necessary.** Implement those five tips and you'll already be in a good place. Then just grow and mature into this new age — and we'll all be happy, we'll create more value, and we'll avoid spending so many tokens on useless gambles."}, {"n": 29, "layout": "closing", "title": "Thank you", "bullets": ["Write as little context as required, and as much as necessary."], "notes": ""}];
const HKEY = 'aqto-hidden';
const ACCENT = {purple:'purple',green:'green',yellow:'yellow',blue:'blue'};
let hidden = new Set(JSON.parse(localStorage.getItem(HKEY) || '[]'));
let curId = SLIDES[0].n;

const deck = document.getElementById('deck');
const dotsEl = document.getElementById('dots');
const notesEl = document.getElementById('notes');
const notesText = document.getElementById('notes-text');
const countEl = document.getElementById('count');
const outline = document.getElementById('outline');
const outlineList = document.getElementById('outline-list');

function accentFor(s){
  if(s.layout==='title'||s.layout==='closing') return 'blue';
  if(s.layout==='divider') return 'green';
  const p=(s.part||'').toLowerCase();
  if(p.includes('01')) return 'blue';
  if(p.includes('02')) return 'purple';
  if(p.includes('03')||p.includes('summary')) return 'green';
  return 'blue';
}
function strip(h){return (h||'').replace(/<[^>]+>/g,'');}

function slideHTML(s){
  const acc = accentFor(s);
  const bullets = (s.bullets||[]).map(b=>`<li class="reveal">${b}</li>`).join('');
  let inner='';
  if(s.layout==='title'){
    inner=`<img class="mona reveal" src="wizard-mona.png" alt="">
      <h1 class="reveal">${s.title}</h1>
      <div class="accent-line reveal"></div>
      <p class="sub reveal">${s.subtitle||''}</p>
      <p class="presenter reveal">${s.presenter||''}</p>`;
  } else if(s.layout==='statement'){
    inner=`${s.part?`<div class="part-tag reveal">${s.part}</div>`:''}
      <h1 class="reveal">${s.title}</h1>
      ${(s.bullets&&s.bullets[0])?`<p class="note-line reveal">${s.bullets[0]}</p>`:''}`;
  } else if(s.layout==='divider'){
    inner=`${s.part?`<div class="part-tag reveal">${s.part}</div>`:''}
      <h1 class="reveal">${s.title}</h1>
      ${(s.bullets&&s.bullets[0])?`<p class="note-line reveal">${s.bullets[0]}</p>`:''}`;
  } else if(s.layout==='closing'){
    inner=`<img class="mona reveal" src="wizard-mona.png" alt="">
      <h1 class="reveal">${s.title}</h1>
      ${(s.bullets&&s.bullets[0])?`<p class="note-line reveal">${s.bullets[0]}</p>`:''}`;
  } else {
    inner=`${s.part?`<div class="part-tag reveal">${s.part}</div>`:''}
      ${s.kicker?`<div class="eyebrow reveal">${s.kicker}</div>`:''}
      <h2 class="reveal">${s.title}</h2>
      <ul class="bullets">${bullets}</ul>`;
  }
  return `<section class="slide ${s.layout}" data-id="${s.n}" data-accent="${acc}">${inner}</section>`;
}

function render(){
  deck.innerHTML = SLIDES.map(slideHTML).join('');
  applyHidden();
  buildOutline();
  observe();
}
function visible(){ return SLIDES.filter(s=>!hidden.has(s.n)); }
function sectionById(id){ return deck.querySelector(`.slide[data-id="${id}"]`); }

function applyHidden(){
  SLIDES.forEach(s=>{
    const el=sectionById(s.n);
    if(el) el.classList.toggle('is-hidden', hidden.has(s.n));
  });
  buildDots();
  if(hidden.has(curId)){ const v=visible(); if(v.length) curId=v[0].n; }
  updateCount();
}
function buildDots(){
  const v=visible();
  dotsEl.innerHTML = v.map(s=>`<button data-id="${s.n}" title="${strip(s.title).slice(0,60)}"></button>`).join('');
  dotsEl.querySelectorAll('button').forEach(b=>b.onclick=()=>goto(+b.dataset.id));
  markDots();
}
function markDots(){
  dotsEl.querySelectorAll('button').forEach(b=>b.classList.toggle('active', +b.dataset.id===curId));
}
function updateCount(){
  const v=visible(); const i=v.findIndex(s=>s.n===curId);
  countEl.textContent = `${i<0?1:i+1} / ${v.length}`;
}
function goto(id){ const el=sectionById(id); if(el) el.scrollIntoView(); }
function setCurrent(id){
  curId=id; markDots(); updateCount();
  const s=SLIDES.find(x=>x.n===id);
  notesText.textContent = (s&&s.notes) ? s.notes : '(no speaker notes for this slide)';
}
function step(dir){
  const v=visible(); let i=v.findIndex(s=>s.n===curId);
  if(i<0) i=0;
  const ni=Math.min(Math.max(i+dir,0),v.length-1);
  goto(v[ni].n);
}

let io;
function observe(){
  if(io) io.disconnect();
  io=new IntersectionObserver((es)=>{
    es.forEach(e=>{
      if(e.isIntersecting){
        e.target.querySelectorAll('.reveal').forEach((r,k)=>setTimeout(()=>r.classList.add('on'),k*60));
        setCurrent(+e.target.dataset.id);
      }
    });
  },{threshold:.55});
  deck.querySelectorAll('.slide').forEach(s=>io.observe(s));
}

/* hide / show */
function toggleHide(id){
  if(hidden.has(id)) hidden.delete(id); else hidden.add(id);
  localStorage.setItem(HKEY, JSON.stringify([...hidden]));
  applyHidden(); buildOutline();
}
function buildOutline(){
  outlineList.innerHTML = SLIDES.map(s=>{
    const isH=hidden.has(s.n);
    return `<li class="${isH?'hidden-row':''}" data-id="${s.n}">
      <span class="idx">${s.n}</span>
      <span class="t">${strip(s.title)||s.layout}</span>
      <span class="eye">${isH?'Hidden':'Shown'}</span></li>`;
  }).join('');
  outlineList.querySelectorAll('li').forEach(li=>{
    li.onclick=()=>toggleHide(+li.dataset.id);
  });
}
document.getElementById('btn-notes').onclick=()=>{notesEl.classList.toggle('open');document.getElementById('btn-notes').classList.toggle('on');};
document.getElementById('btn-outline').onclick=()=>outline.classList.add('open');
document.getElementById('close-outline').onclick=()=>outline.classList.remove('open');
document.getElementById('unhide-all').onclick=()=>{hidden.clear();localStorage.setItem(HKEY,'[]');applyHidden();buildOutline();};

document.addEventListener('keydown',e=>{
  if(e.key==='ArrowDown'||e.key==='PageDown'||e.key===' '){e.preventDefault();step(1);}
  else if(e.key==='ArrowUp'||e.key==='PageUp'){e.preventDefault();step(-1);}
  else if(e.key==='ArrowRight'){step(1);} else if(e.key==='ArrowLeft'){step(-1);}
  else if(e.key==='n'||e.key==='N'){notesEl.classList.toggle('open');document.getElementById('btn-notes').classList.toggle('on');}
  else if(e.key==='o'||e.key==='O'){outline.classList.toggle('open');}
  else if(e.key==='h'||e.key==='H'){toggleHide(curId);}
  else if(e.key==='Home'){const v=visible();if(v.length)goto(v[0].n);}
  else if(e.key==='End'){const v=visible();if(v.length)goto(v[v.length-1].n);}
});
render();
setCurrent(curId);
</script>
</body>
</html>
